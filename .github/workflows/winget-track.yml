name: Winget track

on:
  schedule:
    - cron: '0 * * * *'   # every 1 hour
  workflow_dispatch:

permissions:
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve and close merged winget trackers
        env:
          GH_TOKEN: ${{ github.token }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh issue list --repo "$REPO" --label winget --state open \
            --json number,title,body --jq '.[] | @base64' | while read -r row; do
            _jq() { echo "$row" | base64 -d | jq -r "$1"; }
            NUM=$(_jq '.number')
            TITLE=$(_jq '.title')
            BODY=$(_jq '.body')

            # Contributor mentions were recorded in the body when the tracker was opened
            MENTIONS=$(echo "$BODY" \
              | grep -ioE 'Contributors to this release:.*' \
              | sed -E 's/.*release:[[:space:]]*//I' || true)
            [ -z "$MENTIONS" ] && MENTIONS="@michaelsanford"

            # Prefer the PR number recorded in the body; otherwise re-search by version
            PR_NUM=$(echo "$BODY" | grep -ioE 'winget-pkgs/pull/[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            if [ -z "$PR_NUM" ]; then
              TAG=$(echo "$TITLE" | grep -oE 'v?[0-9][0-9A-Za-z.+-]*$' || true)
              VERSION="${TAG#v}"
              if [ -n "$VERSION" ]; then
                # Try real-time pulls endpoint first (most robust)
                PR_NUM=$(gh api -X GET repos/microsoft/winget-pkgs/pulls -f per_page=100 \
                  --jq "[.[] | select(.title | contains(\"michaelsanford.mdr version ${VERSION}\"))][0].number // empty" 2>/dev/null || true)

                # Fall back to search API
                if [ -z "$PR_NUM" ]; then
                  PR_NUM=$(gh api -X GET search/issues \
                    -f q="repo:microsoft/winget-pkgs in:title michaelsanford.mdr version ${VERSION} type:pr" \
                    --jq '.items[0].html_url // empty' | grep -oE '[0-9]+$' || true)
                fi
              fi

              # Update issue body to include the PR link if found
              if [ -n "$PR_NUM" ]; then
                if echo "$BODY" | grep -qF "Downstream PR could not be located automatically"; then
                  NEW_BODY=$(echo "$BODY" | sed "s|Downstream PR could not be located automatically — check https://github.com/microsoft/winget-pkgs/pulls?q=michaelsanford.mdr|Downstream PR: https://github.com/microsoft/winget-pkgs/pull/$PR_NUM|g")
                  gh issue edit "$NUM" --body "$NEW_BODY" --repo "$REPO"
                fi
              fi
            fi

            if [ -z "$PR_NUM" ]; then
              echo "Issue #$NUM: no downstream PR located yet, leaving open."
              continue
            fi

            INFO=$(gh api "repos/microsoft/winget-pkgs/pulls/${PR_NUM}")
            MERGED=$(echo "$INFO" | jq -r '.merged')
            STATE=$(echo "$INFO" | jq -r '.state')

            if [ "$MERGED" = "true" ]; then
              gh issue close "$NUM" --repo "$REPO" --reason completed \
                --comment "🎉 Merged downstream in microsoft/winget-pkgs#${PR_NUM}. Thanks ${MENTIONS}! Closing this tracker."
              echo "Issue #$NUM: closed (PR #$PR_NUM merged)."
            elif [ "$STATE" = "closed" ]; then
              gh issue close "$NUM" --repo "$REPO" --reason "not planned" \
                --comment "⚠️ Downstream PR microsoft/winget-pkgs#${PR_NUM} was closed without merging. cc ${MENTIONS} — please verify. Closing this tracker."
              echo "Issue #$NUM: closed (PR #$PR_NUM closed without merge)."
            else
              echo "Issue #$NUM: PR #$PR_NUM still open, checking labels and comments..."
              
              # --- Fetch downstream PR labels (excluding New-Manifest) ---
              LABELS=$(echo "$INFO" | jq -r '.labels[].name | select(. != "New-Manifest")' 2>/dev/null || true)
              
              # --- Fetch existing tracker issue comments to prevent duplicates ---
              EXISTING_COMMENTS=$(gh issue view "$NUM" --repo "$REPO" --json comments --jq '.comments[].body' 2>/dev/null || true)
              
              # Check draft status and mark ready if automated validation passed
              DRAFT=$(echo "$INFO" | jq -r '.draft')
              HAS_AZURE=$(echo "$LABELS" | grep -Fx "Azure-Pipeline-Passed" || true)
              HAS_VALIDATION=$(echo "$LABELS" | grep -Fx "Validation-Completed" || true)

              if [ "$DRAFT" = "true" ] && [ -n "$HAS_AZURE" ] && [ -n "$HAS_VALIDATION" ]; then
                echo "Issue #$NUM: Both Azure-Pipeline-Passed and Validation-Completed labels are present. Marking PR #$PR_NUM as ready to review..."
                if GH_TOKEN="$WINGET_TOKEN" gh pr ready "$PR_NUM" --repo microsoft/winget-pkgs; then
                  gh issue comment "$NUM" --repo "$REPO" --body "🚀 **Downstream PR checks passed:** Marking microsoft/winget-pkgs#${PR_NUM} as Ready for Review."
                  EXISTING_COMMENTS="$EXISTING_COMMENTS
🚀 **Downstream PR checks passed:** Marking microsoft/winget-pkgs#${PR_NUM} as Ready for Review."
                else
                  echo "Failed to mark PR #$PR_NUM as ready."
                fi
              fi

              # Report new labels
              if [ -n "$LABELS" ]; then
                echo "$LABELS" | while read -r label; do
                  [ -z "$label" ] && continue
                  if ! echo "$EXISTING_COMMENTS" | grep -F "Downstream PR label detected" | grep -Fq "$label"; then
                    gh issue comment "$NUM" --repo "$REPO" --body "🏷️ **Downstream PR label detected:** \`$label\`"
                    echo "Issue #$NUM: Reported new label $label."
                  fi
                done
              fi

              # --- Fetch downstream PR comments for validation failures ---
              PR_COMMENTS=$(gh api "repos/microsoft/winget-pkgs/issues/${PR_NUM}/comments" 2>/dev/null || true)
              if [ -n "$PR_COMMENTS" ] && [ "$PR_COMMENTS" != "[]" ]; then
                echo "$PR_COMMENTS" | jq -c '.[]' | while read -r comment; do
                  CID=$(echo "$comment" | jq -r '.id')
                  C_BODY=$(echo "$comment" | jq -r '.body')
                  
                  # Scan for validation failure keywords
                  if echo "$C_BODY" | grep -qiE "(Inconsistencies detected|Failed|Error|Reject|Missing|Validation Failed)"; then
                    if ! echo "$EXISTING_COMMENTS" | grep -Fq "Comment #$CID"; then
                      gh issue comment "$NUM" --repo "$REPO" --body "⚠️ **Downstream validation reported an issue:** (Comment #$CID)
                      
                      $C_BODY"
                      echo "Issue #$NUM: Forwarded downstream comment #$CID."
                    fi
                  fi
                done
              fi
            fi
          done
