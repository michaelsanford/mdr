name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/FUNDING.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/winget.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/FUNDING.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/winget.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, linux-musl-x64, linux-musl-arm64, osx-x64, osx-arm64]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '9.x'

      - name: Restore (${{ matrix.rid }})
        run: dotnet restore mdr.csproj --runtime ${{ matrix.rid }}

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish mdr.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained \
            --no-restore
