name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/FUNDING.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/winget.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/FUNDING.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/winget.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, linux-musl-x64, linux-musl-arm64, osx-x64, osx-arm64]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.x'

      - name: Restore (${{ matrix.rid }})
        run: dotnet restore mdr.csproj --runtime ${{ matrix.rid }}

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish mdr.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained \
            --no-restore
