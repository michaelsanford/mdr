name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: mdr.exe
            suffix: win-x64.exe
          - rid: win-arm64
            artifact: mdr.exe
            suffix: win-arm64.exe
          - rid: linux-x64
            artifact: mdr
            suffix: linux-x64
          - rid: linux-arm64
            artifact: mdr
            suffix: linux-arm64
          - rid: linux-musl-x64
            artifact: mdr
            suffix: linux-musl-x64
          - rid: linux-musl-arm64
            artifact: mdr
            suffix: linux-musl-arm64
          - rid: osx-x64
            artifact: mdr
            suffix: osx-x64
          - rid: osx-arm64
            artifact: mdr
            suffix: osx-arm64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '9.x'

      - name: Restore (${{ matrix.rid }})
        run: dotnet restore mdr.csproj --runtime ${{ matrix.rid }}

      - name: Publish self-contained binary
        run: |
          dotnet publish mdr.csproj \
            --no-restore \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained \
            --output publish/

      - name: Rename artifact
        run: cp "publish/${{ matrix.artifact }}" "publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign artifact with cosign
        run: |
          cosign sign-blob --yes \
            publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }} \
            --bundle publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }}.bundle

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.suffix }}
          path: |
            publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }}
            publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }}.bundle

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '9.x'

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets/
          merge-multiple: true

      - name: Generate SBOM
        run: |
          dotnet tool install --global CycloneDX --version 6.2.0
          dotnet-CycloneDX mdr.csproj -o assets/ -fn sbom.json -F Json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            assets/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft
