name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    strategy:
      matrix:
        include:
          - rid: win-x64
            artifact: mdr.exe
            suffix: win-x64.exe
          - rid: win-arm64
            artifact: mdr.exe
            suffix: win-arm64.exe
          - rid: linux-x64
            artifact: mdr
            suffix: linux-x64
          - rid: linux-arm64
            artifact: mdr
            suffix: linux-arm64
          - rid: linux-musl-x64
            artifact: mdr
            suffix: linux-musl-x64
          - rid: linux-musl-arm64
            artifact: mdr
            suffix: linux-musl-arm64
          - rid: osx-x64
            artifact: mdr
            suffix: osx-x64
          - rid: osx-arm64
            artifact: mdr
            suffix: osx-arm64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '9.x'

      - name: Restore
        run: dotnet restore mdr.csproj --locked-mode

      - name: Publish self-contained binary
        run: |
          dotnet publish mdr.csproj \
            --no-restore \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained \
            --output publish/

      - name: Rename artifact
        run: cp "publish/${{ matrix.artifact }}" "publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }}

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Sign artifact with cosign
        run: |
          cosign sign-blob --yes \
            publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }} \
            --bundle publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }}.bundle

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.suffix }}
          path: |
            publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }}
            publish/mdr-${{ github.ref_name }}-${{ matrix.suffix }}.bundle

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '9.x'

      - name: Download all artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          path: assets/
          merge-multiple: true

      - name: Generate SBOM
        run: |
          dotnet tool install --global CycloneDX --version 6.2.0
          dotnet-CycloneDX mdr.csproj -o assets/ -fn sbom.json -F Json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            assets/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft
