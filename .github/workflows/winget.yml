name: Publish winget

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  winget:
    runs-on: windows-latest
    steps:
      - name: Submit to winget
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: michaelsanford.mdr
          installers-regex: '\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}

  track:
    needs: winget
    runs-on: ubuntu-latest
    if: github.event_name == 'release'   # tag_name only exists on release events
    permissions:
      issues: write
    steps:
      - name: Create tracking issue for winget PR
        env:
          GH_TOKEN: ${{ github.token }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          PR_URL=""
          for i in $(seq 1 10); do
            # Try real-time pulls endpoint first (most robust & instant)
            PR_URL=$(gh api -X GET repos/microsoft/winget-pkgs/pulls -f per_page=100 \
              --jq "[.[] | select(.title | contains(\"michaelsanford.mdr version ${VERSION}\"))][0].html_url // empty")

            # Fall back to search API if not found on page 1 of pulls
            if [ -z "$PR_URL" ]; then
              QUERY="repo:microsoft/winget-pkgs in:title michaelsanford.mdr version ${VERSION}"
              PR_URL=$(gh api -X GET search/issues -f q="${QUERY} type:pr" --jq '.items[0].html_url // empty')
            fi

            [ -n "$PR_URL" ] && break
            echo "PR not found yet (attempt $i), retrying in 30s..."
            sleep 30
          done

          # Convert downstream PR to draft immediately
          PR_NUM=""
          if [ -n "$PR_URL" ]; then
            PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$' || true)
          fi
          if [ -n "$PR_NUM" ]; then
            echo "Converting downstream PR #$PR_NUM to Draft..."
            GH_TOKEN="$WINGET_TOKEN" gh pr ready "$PR_NUM" --undo --repo microsoft/winget-pkgs || true
          fi

          # --- Determine release contributors (authors + co-authors) ---
          PREV=$(gh api "repos/${REPO}/releases?per_page=20" \
            --jq "[.[] | select(.draft==false) | .tag_name] | .[1] // empty")

          AUTHORS=""
          COAUTHORS=""
          if [ -n "$PREV" ]; then
            COMPARE=$(gh api "repos/${REPO}/compare/${PREV}...${TAG}")
            AUTHORS=$(echo "$COMPARE" | jq -r \
              '[.commits[].author.login] | map(select(. != null and (endswith("[bot]") | not))) | unique | .[]')
            # Co-authored-by trailers: extract login from GitHub noreply emails only
            COAUTHORS=$(echo "$COMPARE" | jq -r '.commits[].commit.message' \
              | grep -iE '^Co-authored-by:' \
              | grep -ioE '([0-9]+\+)?[A-Za-z0-9._-]+@users\.noreply\.github\.com' \
              | sed -E 's/@users\.noreply\.github\.com//I; s/^[0-9]+\+//' || true)
          fi

          # Always include the maintainer, dedupe, format as @mentions
          MENTIONS=$(printf '%s\n%s\nmichaelsanford\n' "$AUTHORS" "$COAUTHORS" \
            | sed '/^$/d' | sort -u | sed 's/^/@/' | paste -sd ' ' -)

          # --- Compose body ---
          if [ -z "$PR_URL" ]; then
            LINK_LINE="Downstream PR could not be located automatically — check https://github.com/microsoft/winget-pkgs/pulls?q=michaelsanford.mdr"
          else
            LINK_LINE="Downstream PR: ${PR_URL}"
          fi

          BODY=$(printf '%s\n' \
            "Tracking downstream approval of the winget manifest update." \
            "" \
            "- Release: ${TAG}" \
            "- ${LINK_LINE}" \
            "" \
            "Contributors to this release: ${MENTIONS}" \
            "" \
            "This issue will close automatically once the downstream PR is merged.")

          # Ensure the label exists, then open the tracker
          gh label create winget --repo "$REPO" \
            --color FFA500 --description "winget release tracking" 2>/dev/null || true

          gh issue create \
            --repo "$REPO" \
            --title "Await Microsoft approval for Winget update ${TAG}" \
            --body "$BODY" \
            --label winget
